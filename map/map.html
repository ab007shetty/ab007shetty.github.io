<!DOCTYPE html>
<html>
  <head>
    <title>Styled Map Types</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=yes">
    <meta charset="utf-8">
	   <link
      href="https://fonts.googleapis.com/css?family=Lato:100,300,400,700,900"
      rel="stylesheet"/>
	
	   <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB5zpvnRkgwU8q-lWcnCIH69AMngcAx52E&callback=initMap">
    </script>
  </head>
  <body>
    <div id="map" style="height:350px;"></div>
	<br>
	<div>
	<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2479.9344241300673!2d74.73902971786046!3d13.461076962648825!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x378f281f07c46d66!2z4LKc4LKo4LKVIC0g4LK44LK-4LKV4LOH4LKk!5e0!3m2!1sen!2sin!4v1595811168357!5m2!1sen!2sin" width="100%" height="350" frameborder="" style="border:"" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
	</div>
    <script>
      function initMap() {
			var location = {lat: 13.4619845, lng: 74.738344};
        var map = new google.maps.Map(document.getElementById('map'), {
          center: location,
          zoom: 15, 
        mapTypeId: google.maps.MapTypeId.HYBRID 
        });
			
  var marker = new google.maps.Marker({
                position: location,
                map: map,
            });   
      }
    </script>
  </body>
</html>
